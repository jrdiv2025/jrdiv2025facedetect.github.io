<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Avatar Lite 3D</title>

<style>
body{
  margin:0;
  background:#0f1220;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas, video{
  width:90vw;
  max-width:320px;
  border-radius:12px;
  margin:8px;
}

.controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#00d4ff;
  color:#000;
  font-weight:bold;
}

.active{
  background:#00ff88;
}

.status{
  margin:10px;
  font-size:14px;
  opacity:.8;
}
</style>
</head>

<body>

<h2>🎭 Face Avatar 3D Lite</h2>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div class="controls">
  <button onclick="setStyle('cyber')">Cyber</button>
  <button onclick="setStyle('neon')">Neon</button>
  <button onclick="setStyle('emoji')">Emoji</button>
  <button onclick="toggleMesh()">Mesh</button>
  <button onclick="snapshot()">📸</button>
  <button onclick="toggleCamera()" id="camBtn">Stop</button>
</div>

<div class="status" id="status">Iniciando...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

canvas.width = 320;
canvas.height = 420;

let style = "cyber";
let showMesh = false;
let running = true;
let landmarks = null;

// ===== FaceMesh =====
const faceMesh = new FaceMesh({
  locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});

faceMesh.setOptions({
  maxNumFaces:1,
  refineLandmarks:true,
  minDetectionConfidence:0.5,
  minTrackingConfidence:0.5
});

// ===== Desenho =====
function drawAvatar(){
  if(!landmarks) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(showMesh){
    drawConnectors(ctx, landmarks, FACEMESH_TESSELATION, {
      color:"#00ff88",
      lineWidth:0.5
    });
  }

  const get = (i)=>({
    x: landmarks[i].x * canvas.width,
    y: landmarks[i].y * canvas.height
  });

  // FACE
  ctx.beginPath();
  [10,234,454,152,234].forEach((i,idx)=>{
    const p = get(i);
    idx?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);
  });
  ctx.closePath();

  if(style==="cyber"){
    ctx.strokeStyle="#00d4ff";
    ctx.shadowColor="#00d4ff";
    ctx.shadowBlur=15;
  }

  if(style==="neon"){
    ctx.strokeStyle="#ff00ff";
    ctx.shadowColor="#ff00ff";
    ctx.shadowBlur=20;
  }

  if(style==="emoji"){
    ctx.fillStyle="#ffd93d";
    ctx.fill();
    ctx.strokeStyle="#000";
    ctx.shadowBlur=0;
  }

  ctx.lineWidth=2;
  ctx.stroke();
  ctx.shadowBlur=0;

  // OLHOS
  function eye(indices){
    let cx=0,cy=0;
    indices.forEach(i=>{
      const p=get(i);
      cx+=p.x; cy+=p.y;
    });
    cx/=indices.length;
    cy/=indices.length;

    ctx.beginPath();
    ctx.arc(cx,cy,6,0,Math.PI*2);
    ctx.fillStyle="#fff";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx,cy,3,0,Math.PI*2);
    ctx.fillStyle="#000";
    ctx.fill();
  }

  eye([33,133,160]);
  eye([362,263,387]);

  // BOCA
  const m1=get(61);
  const m2=get(291);

  ctx.beginPath();
  ctx.moveTo(m1.x,m1.y);
  ctx.lineTo(m2.x,m2.y);
  ctx.strokeStyle="#ff6b6b";
  ctx.stroke();
}

// ===== RESULTADOS =====
faceMesh.onResults(res=>{
  if(res.multiFaceLandmarks.length){
    landmarks = res.multiFaceLandmarks[0];
    status.textContent="Rosto detectado";
    drawAvatar();
  }else{
    status.textContent="Aponte o rosto";
  }
});

// ===== CÂMERA =====
let camera;

async function start(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;

  camera = new Camera(video,{
    onFrame: async ()=>{
      if(running) await faceMesh.send({image:video});
    },
    width:320,
    height:240
  });

  camera.start();
}

function toggleCamera(){
  running = !running;
  document.getElementById("camBtn").innerText = running?"Stop":"Start";
}

// ===== CONTROLES =====
function setStyle(s){
  style=s;
}

function toggleMesh(){
  showMesh=!showMesh;
}

function snapshot(){
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="avatar.png";
  a.click();
}

// ===== INIT =====
start();
</script>

</body>
</html>
